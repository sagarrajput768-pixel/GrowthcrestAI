name = "growthcrestai-proxy"
main = "Worker.js"
compatibility_date = "2026-05-07"

# Enable workers.dev deployment
workers_dev = true

# Environment variables (DO NOT put real key here in production)
[vars]
# ANTHROPIC_API_KEY = "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"

# Optional: if you later bind a custom domain
# route = "api.growthcrestai.com/*"
# zone_id = "your-zone-id"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
